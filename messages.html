<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔒 ROLE PROTECTION -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
    <h2>GYM SYSTEM</h2>
    <div class="menu" id="menu"></div>
</div>

<!-- MAIN -->
<div class="layout">
    <div class="main">

        <div class="section">
            <h2>System Messages</h2>

            <ul id="messages-list"></ul>

            <br>
            <button onclick="clearMessages()">Clear All</button>
        </div>

    </div>
</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<!-- 🔥 GLOBAL ALERT SYSTEM -->
<script src="js/alert.js"></script>

<script>
// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
    menu.innerHTML = `
        <a href="admin.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
        <a href="members.html">Members</a>
        <a href="staff_manage.html">Staff</a>
        <a href="create_account.html">Create Account</a>
    `;
}else{
    menu.innerHTML = `
        <a href="staff.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
    `;
}

// ================= LOAD =================
function loadMessages(){
    const list = document.getElementById("messages-list");
    list.innerHTML = "";

    let messages = JSON.parse(localStorage.getItem("messages")) || [];

    if(messages.length === 0){
        list.innerHTML = "<li>No alerts</li>";
        return;
    }

    messages.forEach(msg => {
        list.innerHTML += `
            <li style="margin-bottom:10px;">
                <b>⚠️ ${msg.text}</b><br>
                <small>${msg.time}</small>
            </li>
        `;
    });
}

// ================= CLEAR =================
function clearMessages(){
    localStorage.removeItem("messages");
    loadMessages();
}

// ================= AUTO REFRESH =================
setInterval(loadMessages, 1000);

// ================= INIT =================
loadMessages();
</script>

</body>
</html>
